PACKAGE_NAME="iris-vpu"
PACKAGE_VERSION="1.0.0"

# Build iris_vpu module only
BUILT_MODULE_NAME[0]="iris_vpu"
BUILT_MODULE_LOCATION[0]="."
DEST_MODULE_LOCATION[0]="/extra/dkms"

# Use wrapper script
MAKE[0]="scripts/dkms-build-wrapper.sh"
CLEAN="make clean"

AUTOINSTALL="yes"

# Configuration for custom kernels - minimal changes to fix apport error
# Disable apport error reporting system for custom kernels
NO_WEAK_MODULES="yes"
# Skip initrd regeneration to avoid issues
REMAKE_INITRD="no"
