# Blacklist qcom_iris (in-tree driver) to allow iris_vpu (out-of-tree) to load.
# Installed to /usr/lib/modprobe.d/ (not /etc/) so it is treated as a
# regular package file and removed automatically on 'dpkg --remove',
# enabling clean qcom_iris/iris_vpu switching without requiring --purge.
# initramfs-tools includes /usr/lib/modprobe.d/ in the initramfs, so
# the blacklist is active during early boot.
blacklist qcom_iris
install qcom_iris /bin/true