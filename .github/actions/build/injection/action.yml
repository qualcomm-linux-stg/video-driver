name: IRIS Injection
description: Inject IRIS app into rootfs image

inputs:
  machine:
    description: Target machine name
    required: true
  image_dir:
    description: Path to the built image directory
    required: true

runs:
  using: "composite"
  steps:
    - name: Create top-level images directory
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/images

    - name: Run IRIS injection in Docker
      shell: bash
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -v /local/mnt/workspace/manigurr:/mnt \
          -w /workspace \
          --privileged \
          kas_dependencies \
          bash -c "
            set -e

            IMAGE_DIR=/workspace/${{ inputs.image_dir }}
            TARGET_DIR=/workspace/images/${{ inputs.machine }}
            ROOTFS_NAME=\$(ls \$IMAGE_DIR | grep 'qcom-multimedia-proprietary-image-${{ inputs.machine }}.*rootfs.qcomflash' | head -n 1)
            ROOTFS_PATH=\$IMAGE_DIR/\$ROOTFS_NAME

            if [[ ! -f \"\$ROOTFS_PATH\" ]]; then
              echo '❌ Rootfs image not found: \$ROOTFS_PATH'
              exit 1
            fi

            echo '📦 Copying image to injection workspace...'
            mkdir -p \$TARGET_DIR
            cp \$ROOTFS_PATH \$TARGET_DIR/rootfs.img

            echo '🔍 Mounting rootfs.img...'
            mkdir -p /mnt/system_mount
            if ! sudo mount -o loop \$TARGET_DIR/rootfs.img /mnt/system_mount; then
              echo '⚠️ Mount failed, attempting journal recovery...'
              sudo e2fsck -f \$TARGET_DIR/rootfs.img
              sudo mount -o loop \$TARGET_DIR/rootfs.img /mnt/system_mount
            fi

            echo '📁 Creating IRIS app directories...'
            sudo mkdir -p /mnt/system_mount/data/vendor/iris_test_app/input
            sudo mkdir -p /mnt/system_mount/data/vendor/iris_test_app/output

            echo '📥 Copying iris_v4l2_test binary...'
            sudo cp /mnt/iris_v4l2_test /mnt/system_mount/data/vendor/iris_test_app/
            sudo chmod +x /mnt/system_mount/data/vendor/iris_test_app/iris_v4l2_test

            echo '🔍 Verifying contents...'
            ls -l /mnt/system_mount/data/vendor/iris_test_app

            echo '📤 Unmounting image...'
            sudo umount /mnt/system_mount
            rm -rf /mnt/system_mount

            echo '✅ IRIS injection completed for ${{ inputs.machine }}.'
          "
