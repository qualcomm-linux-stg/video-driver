name: Build Workspace
description: |
  Builds kernel and video-driver using a Docker image.

inputs:
  docker_image:
    description: Docker image to use
    required: true
  workspace_path:
    description: Path to workspace directory
    required: true

runs:
  using: "composite"
  steps:
    - name: Build kernel
      shell: bash
      run: |
        cd kernel
        docker run -i --rm \
          -v "${{ inputs.workspace_path }}:${{ inputs.workspace_path }}" \
          -w "${{ inputs.workspace_path }}/kernel" \
          --user $(id -u):$(id -g) \
          --privileged \
          ${{ inputs.docker_image }} \
          bash -c "
            make O=../kobj ARCH=arm64 defconfig
            make O=../kobj -j$(nproc)
            make O=../kobj -j$(nproc) dir-pkg INSTALL_MOD_STRIP=1
          "

    - name: Build video-driver
      shell: bash
      run: |
        cd video-driver
        docker run -i --rm \
          -v "${{ inputs.workspace_path }}:${{ inputs.workspace_path }}" \
          -w "${{ inputs.workspace_path }}/video-driver" \
          --user $(id -u):$(id -g) \
          --privileged \
          ${{ inputs.docker_image }} \
          bash -c "
            make -C ../kobj M=$(pwd) VIDEO_KERNEL_ROOT=$(pwd) modules
          "
