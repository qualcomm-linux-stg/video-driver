name: Build
description: Build the project using a Docker container

inputs:
  docker_image:
    description: Docker image to use for the build job
    required: true
  kas_file:
    description: KAS file to use for the build job
    required: true
  build_command:
    description: Command to run for the build
    required: false
    default: "bitbake core-image-base"

runs:
  using: "composite"
  steps:
    - name: Build ${{ env.machine }}
      shell: bash
      run: |
        set -euo pipefail

        USER_ID=$(id -u)
        GROUP_ID=$(id -g)
        MACHINE="${{ env.machine }}"
        KAS_FILE="${{ inputs.kas_file }}"
        BUILD_COMMAND="${{ inputs.build_command }}"

        echo "Machine: ${MACHINE}"
        echo "Docker image: ${{ inputs.docker_image }}"
        echo "KAS file: ${KAS_FILE}"
        echo "Build command: ${BUILD_COMMAND}"

        docker run --rm \
          --user "${USER_ID}:${GROUP_ID}" \
          -v "${PWD}:/workspace" \
          -w /workspace \
          -e "MACHINE=${MACHINE}" \
          -e "KAS_FILE=${KAS_FILE}" \
          -e "BUILD_COMMAND=${BUILD_COMMAND}" \
          "${{ inputs.docker_image }}" \
          bash -lc '
            set -euo pipefail
            echo "Starting build for ${MACHINE}"
            echo "Using kas file: ${KAS_FILE}"
            echo "Running build command: ${BUILD_COMMAND}"
            echo
            echo "=== inside container: pwd ==="
            pwd
            echo
            echo "=== inside container: top-level listing ==="
            ls -la
            echo
            echo "=== inside container: ci listing ==="
            ls -la ci || true
            echo
            echo "=== inside container: all yml/yaml files ==="
            find . -type f \( -name "*.yml" -o -name "*.yaml" \) | sort
            echo
            echo "=== kas info ==="
            which kas
            kas --version
            echo
            kas shell -c "${BUILD_COMMAND}" "${KAS_FILE}"
          '