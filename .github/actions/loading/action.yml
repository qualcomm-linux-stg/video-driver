name: Load Configuration (Reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch to checkout (optional)'
        required: false
        type: string
        default: '' # Defaults to empty so pre_merge uses the current commit
    outputs:
      build_matrix:
        description: "The generated build matrix"
        value: ${{ jobs.parse_json.outputs.build_matrix }}
      full_matrix:
        description: "The full matrix"
        value: ${{ jobs.parse_json.outputs.full_matrix }}

jobs:
  parse_json:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.generator.outputs.build_matrix }}
      full_matrix: ${{ steps.generator.outputs.full_matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          # If called from Post Merge, this will be 'video.qclinux.0.0'
          # If called from Pre Merge, this is empty (uses current commit)
          ref: ${{ inputs.ref }}

      - name: Generate Matrix
        id: generator
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // KEPT ORIGINAL PATH: Assumes repo structure has a 'video-driver' folder
            const targetsPath = path.join(process.env.GITHUB_WORKSPACE, 'video-driver', 'ci', 'MACHINES.json');
            
            console.log(`Checking path: ${targetsPath}`);
            
            try {
              if (!fs.existsSync(targetsPath)) {
                // If this fails, it means the checkout step didn't get the right files
                core.setFailed(`MACHINES.json not found at ${targetsPath}`);
                return;
              }
              const targets = JSON.parse(fs.readFileSync(targetsPath, 'utf-8'));
              
              const build_matrix = Object.values(targets).map(({ machine, firmware }) => ({ machine, firmware }));
              core.setOutput('build_matrix', JSON.stringify(build_matrix));
              
              const full_matrix = Object.values(targets).map(({ machine, firmware, lavaname }) => ({ machine, firmware, lavaname }));
              core.setOutput('full_matrix', JSON.stringify(full_matrix));
              
            } catch (err) {
              core.setFailed(`Script failed: ${err.message}`);
            }