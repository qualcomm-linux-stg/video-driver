name: Load Parameters
description: Load parameters for the build job

outputs:
  build_matrix:
    description: Build matrix
    value: ${{ steps.set-matrix.outputs.build_matrix }}

runs:
  using: "composite"
  steps:
    - name: Set build matrix
      id: set-matrix
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const machinesFile = path.join(process.env.GITHUB_WORKSPACE, 'ci', 'MACHINES.json');

          let machinesConfig;
          try {
            if (!fs.existsSync(machinesFile)) {
              core.setFailed(`MACHINES.JSON not found at ${machinesFile}`);
              return;
            }

            machinesConfig = JSON.parse(fs.readFileSync(machinesFile, 'utf-8'));
          } catch (err) {
            core.setFailed(`Failed to load or parse MACHINES.json: ${err.message}`);
            return;
          }

          const buildMatrix = Object.values(machinesConfig).map(obj =>
            Object.fromEntries(Object.entries(obj))
          );

          core.setOutput('build_matrix', JSON.stringify(buildMatrix));
          console.log('Build Matrix:', JSON.stringify(buildMatrix, null, 2));