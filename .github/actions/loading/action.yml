name: Load Parameters
description: Load parameters for the build job

outputs:
  build_matrix:
    description: Build matrix
    value: ${{ steps.set-matrix.outputs.build_matrix }}

runs:
  using: "composite"
  steps:
    - name: Set build matrix
      id: set-matrix
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const machineFile = path.join(process.env.GITHUB_WORKSPACE, 'ci', 'MACHINES.json');

          let config;
          try {
            if (!fs.existsSync(machineFile)) {
              core.setFailed(`MACHINES.json not found at ${machineFile}`);
              return;
            }
            config = JSON.parse(fs.readFileSync(machineFile, 'utf-8'));
          } catch (err) {
            core.setFailed(`Failed to load or parse MACHINES.json: ${err.message}`);
            return;
          }

          const buildMatrix = Object.values(config).map(obj =>
            Object.fromEntries(Object.entries(obj))
          );

          core.setOutput('build_matrix', JSON.stringify(buildMatrix));
          console.log("Build Matrix:", JSON.stringify(buildMatrix));