---
name: Load Parameters
description: Load parameters for the build job

outputs:
  build_matrix:
    description: Build matrix
    value: ${{ steps.set-matrix.outputs.build_matrix }}

  full_matrix:
    description: full matrix containing lava devails
    value: ${{ steps.set-matrix.outputs.full_matrix }}

runs:
  using: "composite"
  steps:
    - name: Set Build Matrix
      id: set-matrix
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const core = require('@actions/core');

          try {
            // 1. Locate MACHINES.json dynamically
            // Checks if the code is in the root workspace or a 'video-driver' subdirectory
            // This handles differences between 'pull_request' (merged code) and 'schedule' (clean checkout)
            const workspace = process.env.GITHUB_WORKSPACE;
            const pathInSubdir = path.join(workspace, 'video-driver', 'ci', 'MACHINES.json');
            const pathAtRoot = path.join(workspace, 'ci', 'MACHINES.json');

            let jsonPath;

            if (fs.existsSync(pathAtRoot)) {
              jsonPath = pathAtRoot;
            } else if (fs.existsSync(pathInSubdir)) {
              jsonPath = pathInSubdir;
            } else {
              // Fail if we can't find the config file
              throw new Error(`MACHINES.json not found. Checked: \n1. ${pathAtRoot} \n2. ${pathInSubdir}`);
            }

            console.log(`Found MACHINES.json at: ${jsonPath}`);

            // 2. Read and Parse JSON
            const rawData = fs.readFileSync(jsonPath);
            const machines = JSON.parse(rawData);

            // 3. Determine if we should filter (Check workflow name)
            // If the workflow name contains 'pre_merge', we filter. Otherwise (post_merge), we run everything.
            const workflowName = process.env.GITHUB_WORKFLOW || "";
            const isPreMerge = workflowName.toLowerCase().includes("pre_merge");

            console.log(`Current Workflow: ${workflowName}`);
            console.log(`Mode: ${isPreMerge ? "PRE-MERGE (Filtering for 'premerge': true)" : "POST-MERGE (Running all targets)"}`);

            let buildMatrix = [];
            let fullMatrix = [];

            // 4. Generate Matrices
            machines.forEach(machine => {
              // FILTER LOGIC:
              // If we are in pre_merge mode, skip any machine that does NOT have "premerge": true
              if (isPreMerge && machine.premerge !== true) {
                return; 
              }

              // Add to Build Matrix (Common)
              buildMatrix.push({
                target: machine.name,
                arch: machine.arch,
                variant: machine.variant
              });

              // Add to Full Matrix
              fullMatrix.push({
                target: machine.name,
                arch: machine.arch,
                variant: machine.variant,
                tests: machine.tests || []
              });
            });

            // 5. Output to GitHub Actions
            if (buildMatrix.length === 0) {
                console.warn("WARNING: Matrix is empty! Check if MACHINES.json has 'premerge': true flags.");
            }

            core.setOutput('build_matrix', JSON.stringify(buildMatrix));
            core.setOutput('full_matrix', JSON.stringify(fullMatrix));

            console.log(`Generated matrix with ${buildMatrix.length} targets.`);

          } catch (error) {
            core.setFailed(error.message);
          }