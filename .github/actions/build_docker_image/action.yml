name: Use Prebuilt Video Driver Image (No Inputs)
description: Pulls a fixed Docker image from GHCR and exposes its name as an output (no user inputs)

outputs:
  image_name:
    description: Name of the pulled Docker image
    value: ${{ steps.out.outputs.image_name }}

runs:
  using: composite
  steps:
    - name: Log in to GHCR using GITHUB_TOKEN
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Pull fixed image
      shell: bash
      run: |
        set -euo pipefail
        IMAGE="ghcr.io/qualcomm-linux-stg/video-driver-image:ver.1.0"
        echo "Pulling ${IMAGE} ..."
        docker pull "${IMAGE}"

    - name: Output image name
      id: out
      shell: bash
      run: |
        IMAGE="ghcr.io/qualcomm-linux-stg/video-driver-image:ver.1.0"
        echo "image_name=${IMAGE}" >> "$GITHUB_OUTPUT"
        echo "Pulled image: ${IMAGE}"