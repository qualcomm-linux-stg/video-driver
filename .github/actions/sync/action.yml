name: Sync Codebase
description: |
  Clones kernel and video-driver repositories.

inputs:
  workspace_path:
    description: Path to workspace directory
    required: true
  kernel_branch:
    description: Kernel branch to checkout
    required: false
    default: origin/qcom-next

runs:
  using: "composite"
  steps:
    - name: Clone kernel
      shell: bash
      run: |
        mkdir -p ${{ inputs.workspace_path }}
        cd ${{ inputs.workspace_path }}
        git clone https://github.com/qualcomm-linux/kernel.git
        cd kernel
        git checkout ${{ inputs.kernel_branch }}

    - name: Clone video-driver
      shell: bash
      run: |
        cd ${{ inputs.workspace_path }}
        git clone https://github.com/qualcomm-linux/video-driver.git

