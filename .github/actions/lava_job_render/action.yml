name: LAVA Job Render
description: Parse presigned_urls.json, create cloudData.json for MACHINE, and render a LAVA job definition.

inputs:
  docker_image:
    description: Docker image containing python3, jq (optional), lavacli, and job_render dependencies
    required: true
    default: ghcr.io/qualcomm-linux-stg/kmake-video-image:ver.1.0
  presigned_file:
    description: Path to presigned_urls.json (absolute or relative to workspace)
    required: false
    default: presigned_urls.json
  # Optional; accepted for compatibility, not used by default
  s3_bucket:
    description: S3 bucket (unused by default)
    required: false
    default: ""

# Outputs from this composite action
outputs:
  image_url:
    description: Selected kernel Image/Image.gz URL
    value: ${{ steps.select.outputs.image_url }}
  vmlinux_url:
    description: Selected vmlinux URL (if present)
    value: ${{ steps.select.outputs.vmlinux_url }}
  dtb_url:
    description: Selected DTB URL for MACHINE
    value: ${{ steps.select.outputs.dtb_url }}
  ramdisk_url:
    description: Selected ramdisk URL (machine-specific merged or common)
    value: ${{ steps.select.outputs.ramdisk_url }}
  bootimg_url:
    description: Selected boot payload URL (boot.img or tar.gz)
    value: ${{ steps.select.outputs.bootimg_url }}
  cloudData_path:
    description: Path to generated cloudData.json
    value: ${{ steps.render.outputs.cloudData_path }}
  job_definition_path:
    description: Path to rendered job definition yaml (if produced)
    value: ${{ steps.render.outputs.job_definition_path }}

runs:
  using: "composite"
  steps:
    - name: Validate environment and inputs
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${MACHINE:-}" ]]; then
          echo "MACHINE env not set"; exit 1
        fi
        if [[ -z "${LAVA_NAME:-}" ]]; then
          echo "LAVA_NAME env not set"; exit 1
        fi
        PRES="${{ inputs.presigned_file }}"
        if [[ "${PRES}" != /* ]]; then
          PRES="$GITHUB_WORKSPACE/${PRES}"
        fi
        if [[ ! -s "$PRES" ]]; then
          echo "presigned_urls.json not found at: $PRES"; exit 1
        fi
        JR="$GITHUB_WORKSPACE/job_render"
        if [[ ! -d "$JR" ]]; then
          echo "job_render directory not found at $JR. Clone it in the calling workflow."; exit 1
        fi
        echo "PRESIGNED_PATH=$PRES" >> "$GITHUB_ENV"
        echo "JR_PATH=$JR" >> "$GITHUB_ENV"

    - name: Select artifact URLs from presigned_urls.json
      id: select
      shell: bash
      run: |
        set -euo pipefail
        PRES="$PRESIGNED_PATH"

        # Convert JSON to TSV lines: "path<TAB>url", supporting both object and array formats.
        tsv=$(python3 - "$PRES" <<'PY'
import json,sys
p=sys.argv[1]
with open(p,'r') as f:
    d=json.load(f)
pairs=[]
if isinstance(d, dict):
    for k,v in d.items():
        pairs.append((k,v))
elif isinstance(d, list):
    for item in d:
        if isinstance(item, dict) and 'path' in item and 'url' in item:
            pairs.append((item['path'], item['url']))
else:
    pass
for k,v in pairs:
    print(f"{k}\t{v}")
PY
)
        if [[ -z "$tsv" ]]; then
          echo "Unsupported or empty presigned_urls.json structure."; exit 1
        fi

        # Helper: pick first URL whose path matches any suffix (exact equal or endswith)
        pick_url() {
          local suffixes=("$@")
          while IFS=$'\t' read -r path url; do
            for s in "${suffixes[@]}"; do
              if [[ "$path" == "$s" || "$path" == *"$s" ]]; then
                echo "$url"; return 0
              fi
            done
          done <<< "$tsv"
          return 1
        }

        # DTB mapping by machine
        case "${MACHINE}" in
          qcs9100-ride-sx) dtb_name="qcs9100-ride.dtb" ;;
          qcs8300-ride-sx) dtb_name="qcs8300-ride.dtb" ;;
          qcs6490-rb3gen2) dtb_name="qcs6490-rb3gen2.dtb" ;;
          *) echo "Unknown MACHINE: ${MACHINE}"; exit 1 ;;
        esac

        # Select primary artifacts (kernel Image or Image.gz, vmlinux, dtb, ramdisk, boot payload)
        image_url=$(pick_url "/kobj/arch/arm64/boot/Image" "/Image" "Image")
        if [[ -z "${image_url}" ]]; then
          image_url=$(pick_url "/kobj/arch/arm64/boot/Image.gz" "/Image.gz" "Image.gz" )
        fi

        vmlinux_url=$(pick_url "/kobj/vmlinux" "/vmlinux" "vmlinux")
        dtb_url=$(pick_url "/dts/qcom/${dtb_name}" "${dtb_name}")
        ramdisk_url=$(pick_url "${MACHINE}-merged.cpio.gz")
        if [[ -z "${ramdisk_url}" ]]; then
          # Fallback to common ramdisk
          ramdisk_url=$(pick_url "local-kernel-ramdisk.cpio.gz")
        fi
        bootimg_url=$(pick_url "${MACHINE}-boot.img" "${MACHINE}_boot_payload.tar.gz")

        # Basic sanity: DTB and kernel are required
        if [[ -z "${dtb_url}" ]]; then
          echo "Failed to select DTB URL for ${MACHINE} (${dtb_name})."; exit 1
        fi
        if [[ -z "${image_url}" ]]; then
          echo "Failed to select kernel Image/Image.gz URL."; exit 1
        fi

        # Export as step outputs
        {
          echo "image_url=${image_url}"
          echo "vmlinux_url=${vmlinux_url}"
          echo "dtb_url=${dtb_url}"
          echo "ramdisk_url=${ramdisk_url}"
          echo "bootimg_url=${bootimg_url}"
        } >> "$GITHUB_OUTPUT"

    - name: Create cloudData.json
      id: render
      shell: bash
      run: |
        set -euo pipefail
        JR="$JR_PATH"
        mkdir -p "$JR/data" "$JR/renders"

        cloud="$JR/data/cloudData.json"
        echo '{}' > "$cloud"

        # Inject selected artifact URLs
        set_kv() {
          local key="$1" val="$2"
          [[ -z "$val" ]] && return 0
          python3 - "$cloud" "$key" "$val" <<'PY'
import json,sys
p,k,v=sys.argv[1],sys.argv[2],sys.argv[3]
with open(p,'r') as f: d=json.load(f)
d.setdefault('artifacts',{})[k]=v
with open(p,'w') as f: json.dump(d,f,indent=2)
PY
        }

        set_kv "kernel"   "${{ steps.select.outputs.image_url }}"
        set_kv "vmlinux"  "${{ steps.select.outputs.vmlinux_url }}"
        # Provide DTB under 'dtbs/qcom/<MACHINE>.dtb' for generator or scripts that expect structured DTB path
        set_kv "dtbs/qcom/${MACHINE}.dtb" "${{ steps.select.outputs.dtb_url }}"
        set_kv "ramdisk"  "${{ steps.select.outputs.ramdisk_url }}"
        set_kv "bootimg"  "${{ steps.select.outputs.bootimg_url }}"

        echo "cloudData.json:"
        cat "$cloud"

        # Locate generator script (supports either naming)
        gen="$JR/lava_Job_definition_generator.py"
        if [[ ! -f "$gen" ]]; then
          alt="$JR/lava_job_definition_generator.py"
          if [[ -f "$alt" ]]; then
            gen="$alt"
          else
            echo "LAVA job generator script not found in $JR"; ls -la "$JR" || true; exit 1
          fi
        fi

        # Render job definition using dockerized python
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          --workdir "$JR" \
          -v "$JR":"$JR" \
          -e BOOT_METHOD=fastboot \
          -e TARGET="${LAVA_NAME}" \
          -e TARGET_DTB="${MACHINE}" \
          "${{ inputs.docker_image }}" \
          sh -c 'python3 "'"$gen"'" --localjson ./data/cloudData.json'

        # The job_render generator typically writes renders/lava_job_definition.yaml
        out_yaml="$JR/renders/lava_job_definition.yaml"
        if [[ -s "$out_yaml" ]]; then
          echo "cloudData_path=$cloud" >> "$GITHUB_OUTPUT"
          echo "job_definition_path=$out_yaml" >> "$GITHUB_OUTPUT"
        else
          # Fallback: some variants write JSON per-machine
          out_json="$JR/renders/${MACHINE}.json"
          if [[ -s "$out_json" ]]; then
            echo "cloudData_path=$cloud" >> "$GITHUB_OUTPUT"
            echo "job_definition_path=$out_json" >> "$GITHUB_OUTPUT"
          else
            echo "No rendered job definition found in $JR/renders"; ls -la "$JR/renders" || true; exit 1
          fi
        fi