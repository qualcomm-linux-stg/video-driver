name: IRIS Injection
description: Inject IRIS app into rootfs image

inputs:
  machine:
    description: Target machine name
    required: true
  docker_image:
    description: Docker image name
    required: true

runs:
  using: "composite"
  steps:
    - name: Create top-level images directory
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/images

    - name: Run IRIS injection in Docker
      shell: bash
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          --privileged \
          ${{ inputs.docker_image }} \
          bash -c "
            set -e
            workspace=${{ github.workspace }}
            machine="${{ matrix.build_matrix.machine }}"
            IMAGE_DIR="$workspace/build/tmp/deploy/images/$machine/qcom-multimedia-proprietary-image-${machine}.rootfs.qcomflash"
            TARGET_DIR=/workspace/images/${{ inputs.machine }}

            echo '🔍 Mounting rootfs.img...'
            mkdir -p /tmp/rootfs
            if ! sudo mount -o loop \$TARGET_DIR/rootfs.img /tmp/rootfs; then
              echo '⚠️ Mount failed, attempting journal recovery...'
            fi

            echo '📁 Creating IRIS app directories...'
            sudo mkdir -p /tmp/rootfs/data/vendor/iris_test_app/input
            sudo mkdir -p /tmp/rootfs/data/vendor/iris_test_app/output

            echo '📥 Copying iris_v4l2_test binary...'
            sudo cp ${{ github.workspace }}/v4l-video-test-app/build/iris_v4l2_test /tmp/rootfs/data/vendor/iris_test_app/
            sudo chmod +x /tmp/rootfs/data/vendor/iris_test_app/iris_v4l2_test
            sync
            echo '🔍 Verifying contents...'
            ls -l /tmp/rootfs/data/vendor/iris_test_app

            echo '📤 Unmounting image...'
            sudo umount /tmp/rootfs
            rm -rf /tmp/rootfs

            echo '✅ IRIS injection completed for ${{ inputs.machine }}.'
          "
