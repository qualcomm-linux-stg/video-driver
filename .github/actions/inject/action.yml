name: IRIS Injection
description: Inject IRIS app into rootfs image
 
inputs:
  machine:
    description: Target machine name
    required: true
  docker_image:
    description: Docker image name
    required: true
 
runs:
  using: "composite"
  steps:
    - name: Create top-level images directory
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/images
 
    - name: Run IRIS injection in Docker
      shell: bash
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/..:${{ github.workspace }}/.. \
          -w ${{ github.workspace }} \
          -e "WORKSPACE=${{ github.workspace }}" \
          -e "MACHINE=${{ inputs.machine }}" \
          --privileged \
          ${{ inputs.docker_image }} \
          bash -c "
            set -e
 
            echo '🔧 Installing required tools...'
            sudo apt-get update
            sudo apt-get install -y util-linux e2fsprogs sudo coreutils bash
 
            echo '🌍 Setting environment variables...'
            export IMAGE_DIR=\$WORKSPACE/build/tmp/deploy/images/\$MACHINE/qcom-multimedia-proprietary-image-\${MACHINE}.rootfs.qcomflash
 
            echo '📦 Checking for rootfs.img...'
            cd $WORKSPACE
            mkdir -p /tmp/rootfs

            echo '🔍 Setting up loop device manually...'
            LOOP_DEV=$(sudo losetup -f)
            sudo losetup $LOOP_DEV "$WORKSPACE/rootfs.img"

            echo '📂 Mounting rootfs.img...'
            sudo mount $LOOP_DEV /tmp/rootfs
 
            echo '📁 Creating IRIS app directories...'
            sudo mkdir -p /tmp/rootfs/data/vendor/iris_test_app/input
            sudo mkdir -p /tmp/rootfs/data/vendor/iris_test_app/output
 
            echo '📥 Copying iris_v4l2_test binary...'
            sudo cp \"\$WORKSPACE/v4l-video-test-app/build/iris_v4l2_test\" /tmp/rootfs/data/vendor/iris_test_app/
            sudo chmod +x /tmp/rootfs/data/vendor/iris_test_app/iris_v4l2_test
            sync
 
            echo '🔍 Verifying contents...'
            ls -l /tmp/rootfs/data/vendor/iris_test_app
 
            echo '📤 Unmounting image and releasing loop device...'
            sudo umount /tmp/rootfs
            sudo losetup -d \"\$LOOP_DEV\"
            rm -rf /tmp/rootfs
 
            echo \"✅ IRIS injection completed for \$MACHINE.\"
          "
