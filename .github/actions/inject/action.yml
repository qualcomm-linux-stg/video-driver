name: IRIS Injection
description: Inject IRIS app into rootfs image

inputs:
  machine:
    description: Target machine name
    required: true
  docker_image:
    description: Docker image name
    required: true

runs:
  using: "composite"
  steps:
    - name: Create top-level images directory
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ github.workspace }}/images"

    - name: Run IRIS injection in Docker
      shell: bash
      run: |
        set -euo pipefail

        MACHINE="${{ inputs.machine }}"
        IMAGE_DIR="build/tmp/deploy/images/${MACHINE}/qcom-multimedia-proprietary-image-${MACHINE}.rootfs.qcomflash"

        docker run --rm \
          --privileged \
          -v "${PWD}:/workspace" \
          -w /workspace \
          -e "MACHINE=${MACHINE}" \
          -e "IMAGE_DIR=${IMAGE_DIR}" \
          -e "WORKSPACE=/workspace" \
          "${{ inputs.docker_image }}" \
          bash -s <<'EOF'
        set -euo pipefail

        echo "📦 Checking for qcomflash directory..."
        test -d "$IMAGE_DIR"
        cd "$IMAGE_DIR"
        ls -larth

        echo "📦 Checking for rootfs.img..."
        test -f rootfs.img

        echo "📦 Checking for iris test app payload..."
        test -d "$WORKSPACE/v4l-video-test-app/build"
        ls -la "$WORKSPACE/v4l-video-test-app/build"

        mkdir -p /tmp/rootfs

        cleanup() {
          mountpoint -q /tmp/rootfs && umount /tmp/rootfs || true
        }
        trap cleanup EXIT

        echo "🔗 Mounting rootfs image..."
        mount -o loop rootfs.img /tmp/rootfs

        echo "📁 Creating IRIS app directories..."
        mkdir -p /tmp/rootfs/data/vendor/iris_test_app/input
        mkdir -p /tmp/rootfs/data/vendor/iris_test_app/output

        echo "📥 Copying iris-test-app payload from workspace..."
        cp -a "$WORKSPACE/v4l-video-test-app/build/." /tmp/rootfs/data/vendor/iris_test_app/

        echo "🔍 Verifying contents..."
        ls -larth /tmp/rootfs/data/vendor/iris_test_app

        echo "📤 Syncing and unmounting image..."
        sync
        umount /tmp/rootfs

        echo "✅ IRIS injection completed for ${MACHINE}"
        EOF