name: IRIS Injection
description: Inject IRIS app into rootfs image
 
inputs:
  machine:
    description: Target machine name
    required: true
  docker_image:
    description: Docker image name
    required: true
 
runs:
  using: "composite"
  steps:
    - name: Create top-level images directory
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/images
 
    - name: Run IRIS injection in Docker
      shell: bash
      run: |
        USER_ID=$(id -u)
        GROUP_ID=$(id -g)
        MACHINE="${{ inputs.machine }}"
        image_dir="build/tmp/deploy/images/${MACHINE}/qcom-multimedia-proprietary-image-${MACHINE}.rootfs.qcomflash"
        echo "$image_dir"

        docker run --rm \
          --user ${USER_ID}:${GROUP_ID} \
          -v $PWD:/workspace \
          -w /workspace \
          -e "IMAGE_DIR=$image_dir" \
          --privileged \
          ${{ inputs.docker_image }} \
          bash -c "
            set -eux
 
            echo '📦 Checking for rootfs.img...'
            ls -larth $IMAGE_DIR
            cd $IMAGE_DIR
            mkdir -p /tmp/rootfs

            sudo mount rootfs.img /tmp/rootfs
 
            echo '📁 Creating IRIS app directories...'
            sudo mkdir -p /tmp/rootfs/data/vendor/iris_test_app/input
            sudo mkdir -p /tmp/rootfs/data/vendor/iris_test_app/output
 
            echo '📥 Copying iris_v4l2_test binary...'
            sudo cp "$WORKSPACE/v4l-video-test-app/build/iris_v4l2_test" /tmp/rootfs/data/vendor/iris_test_app/
            sudo chmod +x /tmp/rootfs/data/vendor/iris_test_app/iris_v4l2_test
            sync
 
            # echo '🔍 Verifying contents...'
            # ls -l /tmp/rootfs/data/vendor/iris_test_app
 
            echo '📤 Unmounting image and releasing loop device...'
            sudo umount /tmp/rootfs
 
            echo \"✅ IRIS injection completed for \$MACHINE.\"
          "
