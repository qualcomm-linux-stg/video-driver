---
name: Build Images

on:
  workflow_dispatch:
  push:
    branches:
      - test-workflow

jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        build_matrix:
          - machine: qcs9100-ride-sx
            kas_file: meta-qcom/ci/qcs9100-ride-sx.yml:meta-qcom/ci/qcom-distro.yml
          - machine: qcs8300-ride-sx
            kas_file: meta-qcom/ci/qcs8300-ride-sx.yml:meta-qcom/ci/qcom-distro.yml
          - machine: qcs6490-rb3gen2-core-kit
            kas_file: meta-qcom/ci/qcs6490-rb3gen2-core-kit.yml:meta-qcom/ci/qcom-distro.yml

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.build_matrix.machine }}
        uses: ./.github/actions/build
        with:
          docker_image: "kas_dependencies"
          kas_file: ${{ matrix.build_matrix.kas_file }}
          build_command: "bitbake qcom-multimedia-proprietary-image"
          build_type: "flat_build"

      - name: Upload built image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-${{ matrix.build_matrix.machine }}
          path: build/tmp/deploy/images/${{ matrix.build_matrix.machine }}
