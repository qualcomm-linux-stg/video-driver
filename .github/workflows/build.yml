name: _build

on:
  workflow_call:
    inputs:
      docker_image:
        description: Docker image to use for build
        type: string
        required: true
      build_matrix:
        description: Build matrix for multi target builds
        type: string
        required: true

env:
  KERNEL_MODULE_PATH: kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates

jobs:
  build:
    runs-on:
      group: GHA-video-Stg-SelfHosted-RG
      labels: [self-hosted, video-stg-u2204-x64-large-od-ephem]
    strategy:
      fail-fast: false
      matrix:
        machine: ${{ fromJson(inputs.build_matrix) }}

    steps:
      # 1. Sync repo context (PR, push, etc)
      - name: Sync codebase context
        uses: qualcomm-linux-stg/video-driver/.github/actions/sync@format
        with:
          event_name: ${{ github.event_name }}
          pr_ref: ${{ github.event.pull_request.head.ref }}
          pr_repo: ${{ github.event.pull_request.head.repo.full_name }}
          base_ref: ${{ github.ref_name }}

      # 2. Clone kernel and video-driver sources
      - name: Clone kernel sources
        uses: actions/checkout@v5
        with:
          repository: qualcomm-linux/kernel
          ref: main
          path: kernel

      # 3. Pull Docker image
      - name: Pull Docker image
        uses: qualcomm-linux/kernel-config/.github/actions/pull_docker_image@main
        with:
          image: kmake-image:ver.1.0

      # 4. Build workspace
      - name: Build workspace
        uses: qualcomm-linux-stg/video-driver/.github/actions/build@format
        with:
          docker_image: ${{ inputs.docker_image }}
          workspace_path: ${{ github.workspace }}

      # 5. Generate Iris test app
      - name: Generate Iris test app
        uses: qualcomm-linux-stg/video-driver/.github/actions/generate_iris_test_app@format
        with:
          docker_image: ${{ inputs.docker_image }}
          workspace_path: ${{ github.workspace }}

      # 6. Print workspace contents
      - name: Print full workspace contents
        run: |
          echo "📂 Full workspace contents:"
          find ${{ github.workspace }} -type f -exec ls -lh {} \;

      # 7. Download firmware file from S3
      - name: Download firmware file from S3
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/downloads
          echo "📥 Syncing files from S3 path: s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/"
          aws s3 sync s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/ ${{ github.workspace }}/downloads
          echo "✅ Download complete."

      # 8. Copy driver and test app to target directories and list contents
      - name: Copy driver and test app to target directories and list contents
        run: |
          mkdir -p ${{ env.KERNEL_MODULE_PATH }}
          cp video-driver/iris_vpu.ko ${{ env.KERNEL_MODULE_PATH }}/
          cp v4l-video-test-app/build/iris_v4l2_test ${{ env.KERNEL_MODULE_PATH }}/
          cp downloads/vpu20_1v.mbn ${{ env.KERNEL_MODULE_PATH }}/
          echo "📂 Contents of updates directory:"
          ls -lh ${{ env.KERNEL_MODULE_PATH }}/

      # 9. Create compressed kernel ramdisk archive
      - name: Create compressed kernel ramdisk archive
        run: |
          mkdir -p ${{ matrix.machine.machine }}
          cd kobj/tar-install
          find lib/modules | cpio -o -H newc -R +0:+0 | gzip -9 > "../../${{ matrix.machine.machine }}/local-kernel-ramdisk.cpio.gz"
          cd - > /dev/null
          echo "📦 Archive for ${{ matrix.machine.machine }}:"
          ls -lh "${{ matrix.machine.machine }}/local-kernel-ramdisk.cpio.gz"

      # 10. Download meta-qcom stable initramfs artifacts from S3
      - name: Download meta-qcom stable initramfs artifacts from S3
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/downloads
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-firmware-qcs8300-ride-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-firmware-rb3gen2-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-firmware-sa8775p-ride-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-kerneltest-full-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          echo "✅ All initramfs files downloaded to: ${{ github.workspace }}/downloads"

      # 11. Decompress ramdisk files and rename .cpio.gz files
      - name: Decompress ramdisk files and rename .cpio.gz files
        shell: bash
        run: |
          cd ${{ github.workspace }}/downloads
          gunzip -c initramfs-firmware-qcs8300-ride-image-qcom-armv8a.cpio.gz > firmware-qcs8300-ride-sx.cpio
          gunzip -c initramfs-firmware-rb3gen2-image-qcom-armv8a.cpio.gz > firmware-qcs6490-rb3gen2.cpio
          gunzip -c initramfs-firmware-sa8775p-ride-image-qcom-armv8a.cpio.gz > firmware-qcs9100-ride-sx.cpio
          gunzip -c initramfs-kerneltest-full-image-qcom-armv8a.cpio.gz > kerneltest.cpio

      # 12. Organize decompressed files into target directory
      - name: Organize decompressed files into target directory
        shell: bash
        run: |
          cd ${{ github.workspace }}/downloads
          mkdir -p ../${{ matrix.machine.machine }}
          if [[ "${{ matrix.machine.machine }}" == "qcs9100-ride-sx" ]]; then
            cp firmware-qcs9100-ride-sx.cpio ../${{ matrix.machine.machine }}/
          elif [[ "${{ matrix.machine.machine }}" == "qcs8300-ride-sx" ]]; then
            cp firmware-qcs8300-ride-sx.cpio ../${{ matrix.machine.machine }}/
          elif [[ "${{ matrix.machine.machine }}" == "qcs6490-rb3gen2" ]]; then
            cp firmware-qcs6490-rb3gen2.cpio ../${{ matrix.machine.machine }}/
          fi
          cp kerneltest.cpio ../${{ matrix.machine.machine }}/

      # 13. Merge and repackage initramfs for this machine
      - name: Merge and repackage initramfs for this machine
        shell: bash
        run: |
          cd ${{ github.workspace }}/${{ matrix.machine.machine }}
          mv local-kernel-ramdisk.cpio.gz local-kernel-ramdisk.cpio.gz.bak
          gunzip -c local-kernel-ramdisk.cpio.gz.bak > local-kernel-ramdisk.cpio
          if [[ "${{ matrix.machine.machine }}" == "qcs9100-ride-sx" ]]; then
            firmware_file="firmware-qcs9100-ride-sx.cpio"
          elif [[ "${{ matrix.machine.machine }}" == "qcs8300-ride-sx" ]]; then
            firmware_file="firmware-qcs8300-ride-sx.cpio"
          elif [[ "${{ matrix.machine.machine }}" == "qcs6490-rb3gen2" ]]; then
            firmware_file="firmware-qcs6490-rb3gen2.cpio"
          fi
          cp ${{ github.workspace }}/downloads/$firmware_file .
          cp ${{ github.workspace }}/downloads/kerneltest.cpio .
          cat kerneltest.cpio local-kernel-ramdisk.cpio $firmware_file > ${{ matrix.machine.machine }}-merged.cpio
          gzip -9 ${{ matrix.machine.machine }}-merged.cpio
          mkdir -p temp_merge
          cd temp_merge
          cpio -id < ../kerneltest.cpio
          cpio -id < ../local-kernel-ramdisk.cpio
          cpio -id < ../$firmware_file
          cd ..
          rm ${{ matrix.machine.machine }}-merged.cpio.gz
          cd temp_merge
          find . | cpio -o -H newc > ../${{ matrix.machine.machine }}-merged.cpio
          cd ..
          gzip -9 ${{ matrix.machine.machine }}-merged.cpio
          rm -rf temp_merge local-kernel-ramdisk.cpio kerneltest.cpio $firmware_file

      # 14. List files in machine directory
      - name: List files in machine directory
        shell: bash
        run: |
          echo "📁 Contents of ${{ matrix.machine.machine }}:"
          ls -lh ${{ github.workspace }}/${{ matrix.machine.machine }}

      # 15. Build boot.img for this machine using Docker
      - name: Build boot.img for this machine using Docker
        shell: bash
        run: |
          if [[ "${{ matrix.machine.machine }}" == "qcs9100-ride-sx" ]]; then
            dtb="qcs9100-ride.dtb"
          elif [[ "${{ matrix.machine.machine }}" == "qcs8300-ride-sx" ]]; then
            dtb="qcs8300-ride.dtb"
          elif [[ "${{ matrix.machine.machine }}" == "qcs6490-rb3gen2" ]]; then
            dtb="qcs6490-rb3gen2.dtb"
          fi
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --workdir "$PWD" \
            -v "$(dirname "$PWD")":"$(dirname "$PWD")" \
            kmake-video-image:ver.1.0 \
            mkbootimg \
              --header_version 2 \
              --ramdisk "${{ matrix.machine.machine }}/${{ matrix.machine.machine }}-merged.cpio.gz" \
              --kernel "kobj/arch/arm64/boot/Image" \
              --dtb "kobj/arch/arm64/boot/dts/qcom/$dtb" \
              --cmdline "earlycon clk_ignore_unused pd_ignore_unused audit=0" \
              --base 0x80000000 \
              --pagesize 2048 \
              --output "${{ matrix.machine.machine }}/${{ matrix.machine.machine }}-boot.img"

      # 16. Final contents of machine directory
      - name: Final contents of machine directory
        shell: bash
        run: |
          echo " 📁 Final contents of ${{ matrix.machine.machine }}:"
          ls -lh ${{ github.workspace }}/${{ matrix.machine.machine }}

      # 17. Package boot.img for the S3 upload
      - name: Package boot.img for the S3 upload
        shell: bash
        run: |
          set -e
          workspace=${{ github.workspace }}
          mkdir -p "$workspace/artifacts"
          touch "$workspace/artifacts/file_list.txt"
          bootimg_path="$workspace/${{ matrix.machine.machine }}/${{ matrix.machine.machine }}-boot.img"
          if [ ! -f "$bootimg_path" ]; then
            echo "❌ Missing boot.img for ${{ matrix.machine.machine }}"
            exit 1
          fi
          tarball="${{ matrix.machine.machine }}_boot_payload.tar.gz"
          tar -czf "$workspace/$tarball" -C "$workspace/${{ matrix.machine.machine }}" "${{ matrix.machine.machine }}-boot.img"
          echo "$workspace/$tarball" >> "$workspace/artifacts/file_list.txt"
          echo "✅ Tarball created: $tarball"

      # 18. Upload boot.img to S3
      - name: Upload boot.img to S3
        uses: qualcomm-linux-stg/video-driver/.github/actions/aws_s3_helper@format
        with:
          s3_bucket: qli-stg-video-gh-artifacts
          local_file: ${{ github.workspace }}/artifacts/file_list.txt
          mode: multi-upload
          upload_location: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.run_id }}-${{ github.run_attempt }}

      # 19. Upload boot payload as GitHub artifact
      - name: Upload boot payload as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot_payload_${{ matrix.machine.machine }}
          path: |
            ${{ github.workspace }}/${{ matrix.machine.machine }}/${{ matrix.machine.machine }}-boot.img
            ${{ github.workspace }}/artifacts/*.tar.gz
          retention-days: 7