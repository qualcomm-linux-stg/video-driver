name: Environment setup and build
on:
  push:
    branches:
      - test-workflow
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: ./github/workflows/action.yml
        with:
          docker_image: "kas_dependencies"
          kas_file: "qcs9100-ride-sx.yml:qcom-distro.yml"
          build_command: "bitbake qcom-multimedia-proprietary-image"
          build_type: "flat_build"
  
  
