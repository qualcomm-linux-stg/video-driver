name: _build

on:
  workflow_dispatch:
    inputs:
      build_matrix:
        description: Build matrix for multi-target builds
        type: string
        required: true    

jobs:
  build:
    runs-on:
      group: GHA-Video-Stg-SelfHosted-RG
      labels: [self-hosted, video-stg-u2204-x64-large-od-ephem]
    strategy:
      fail-fast: false
      matrix:
        build_matrix: ${{ fromJson(inputs.build_matrix) }}

    env:
      S3_BUCKET: qli-stg-video-gh-artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build docker image
        id: docker_build
        uses: qualcomm-linux-stg/video-driver/.github/actions/build_docker_image@test-workflow

      - name: Build ${{ matrix.build_matrix.machine }}
        uses: qualcomm-linux-stg/video-driver/.github/actions/build@test-workflow
        with:
          docker_image: ${{ steps.docker_build.outputs.image_name }}
          kas_file: ${{ matrix.build_matrix.kas_file }}
          build_command: "bitbake qcom-multimedia-proprietary-image"

      - name: Prepare .qcomflash files for S3 upload
        run: |
          set -e
          workspace=${{ github.workspace }}
          machine="${{ matrix.build_matrix.machine }}"
          symlink_path="$workspace/build/tmp/deploy/images/$machine/qcom-multimedia-proprietary-image-${machine}.rootfs.qcomflash"
          resolved_dir=$(readlink -f "$symlink_path")
          mkdir -p "$workspace/artifacts"
          touch "$workspace/artifacts/file_list.txt"
          find "$resolved_dir" -type f -exec realpath {} \; >> "$workspace/artifacts/file_list.txt"

      - name: Upload artifacts to S3
        uses: qualcomm-linux-stg/video-driver/.github/actions/aws_s3_helper@test-workflow
        with:
          s3_bucket: ${{ env.S3_BUCKET }}
          local_file: ${{ github.workspace }}/artifacts/file_list.txt
          mode: multi-upload
          machine: ${{ matrix.build_matrix.machine }}

      - name: Trigger Retrieve and Inject
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          event-type: trigger-retrieve-inject
          client-payload: >-
            {
              "s3_run_id": "${{ github.run_id }}-${{ github.run_attempt }}",
              "build_matrix": [
                {
                  "machine": "${{ matrix.build_matrix.machine }}",
                  "kas_file": "${{ matrix.build_matrix.kas_file }}"
                }
              ]
            }

      - name: Clean up
        run: |
          rm -rf ${{ github.workspace }}/artifacts
          rm -rf ${{ github.workspace }}/build
