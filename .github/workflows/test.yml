name: LAVA Test

on:
  workflow_call:
    inputs:
      docker_image:
        description: Renderer and client image
        default: ghcr.io/qualcomm-linux-stg/kmake-video-image:ver.1.0
        required: false
        type: string
    secrets:
      LAVA_OSS_USER:
        required: true
      LAVA_OSS_TOKEN:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  lava-test:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        machine: [qcs9100-ride-sx, qcs8300-ride-sx, qcs6490-rb3gen2]
    env:
      MACHINE: ${{ matrix.machine }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize DOCKER_IMAGE
        shell: bash
        run: |
          set -euo pipefail
          img="${{ inputs.docker_image }}"
          if [[ "$img" != */* ]]; then
            img="ghcr.io/qualcomm-linux-stg/$img"
          fi
          echo "DOCKER_IMAGE=$img" >> "$GITHUB_ENV"
          echo "Normalized image: $img"

      - name: Verify image string and pull
        shell: bash
        run: |
          echo "DOCKER_IMAGE=$DOCKER_IMAGE"
          docker pull "$DOCKER_IMAGE"

      - name: Download presigned_urls.json artifact
        uses: actions/download-artifact@v4
        with:
          name: presigned_urls.json
          path: presigned_urls

      - name: Normalize manifest path
        shell: bash
        run: |
          set -euo pipefail
          src="$(ls -1 presigned_urls/* 2>/dev/null | head -n1 || true)"
          if [[ -z "$src" ]]; then
            echo "No files under presigned_urls/ — are Sync and Build and LAVA Test in the same workflow run?" >&2
            exit 1
          fi
          cp "$src" "$GITHUB_WORKSPACE/presigned_urls.json"
          echo "Manifest at $GITHUB_WORKSPACE/presigned_urls.json"

      - name: Clone job_render repository
        uses: actions/checkout@v4
        with:
          repository: qualcomm-linux-stg/job_render
          path: job_render
          ref: workflow_2

      - name: Set LAVA_NAME
        shell: bash
        run: |
          set -euo pipefail
          case "${MACHINE}" in
            qcs9100-ride-sx) lava="qcs9100-ride-lava" ;;
            qcs8300-ride-sx) lava="qcs8300-ride-lava" ;;
            qcs6490-rb3gen2) lava="qcs6490-rb3gen2-lava" ;;
            *) echo "Unknown MACHINE ${MACHINE}" >&2; exit 1 ;;
          esac
          echo "LAVA_NAME=$lava" >> "$GITHUB_ENV"
          echo "Set LAVA_NAME=$lava"

      - name: Render job using composite
        uses: qualcomm-linux-stg/video-driver/.github/actions/lava_job_render@workflow_2
        with:
          docker_image: ${{ inputs.docker_image }}
          s3_bucket: qli-stg-video-gh-artifacts
        env:
          MACHINE: ${{ env.MACHINE }}
          LAVA_NAME: ${{ env.LAVA_NAME }}

      - name: Submit LAVA job
        id: submit
        env:
          LAVA_USER: ${{ secrets.LAVA_OSS_USER }}
          LAVA_TOKEN: ${{ secrets.LAVA_OSS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd job_render
          def="renders/${MACHINE}.json"
          test -f "$def"
          echo "Submitting job $def"
          docker run --rm -i "$DOCKER_IMAGE" \
            python3 lava_Job_submitter.py \
              --definition "$def" \
              --out job_submission.json
          job_id="$(jq -r '.job_id' job_submission.json)"
          job_url="$(jq -r '.job_url' job_submission.json)"
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
          echo "job_url=$job_url" >> "$GITHUB_OUTPUT"
          echo "Submitted: $job_url"

      - name: Poll LAVA job status
        id: poll
        shell: bash
        run: |
          set -euo pipefail
          cd job_render
          job_id="${{ steps.submit.outputs.job_id }}"
          echo "Polling job $job_id"
          for i in {1..60}; do
            docker run --rm -i "$DOCKER_IMAGE" \
              python3 lava_Job_status.py \
                --job "$job_id" \
                --out job_status.json
            status="$(jq -r '.status' job_status.json)"
            echo "Attempt $i: $status"
            if [[ "$status" == "PASS" || "$status == "FAIL" || "$status" == "Complete" ]]; then
              break
            fi
            sleep 30
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Update summary and result
        if: always()
        shell: bash
        run: |
          st="${{ steps.poll.outputs.status }}"
          echo "Machine: ${MACHINE}" >> "$GITHUB_STEP_SUMMARY"
          echo "Job: ${{ steps.submit.outputs.job_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Status: ${st}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$st" != "PASS" ]]; then
            echo "LAVA job did not pass"; exit 1
          fi