name: LAVA Test

on:
  workflow_call:
    inputs:
      docker_image:
        description: Renderer and client image
        default: ghcr.io/qualcomm-linux-stg/kmake-video-image:ver.1.0
        required: false
        type: string
    secrets:
      LAVA_OSS_USER:
        required: true
      LAVA_OSS_TOKEN:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  lava-test:
    runs-on: 
      group: GHA-video-Stg-SelfHosted-RG
      labels: [self-hosted, video-stg-u2204-x64-large-od-ephem]
    strategy:
      fail-fast: false
      matrix:
        machine: [qcs9100-ride-sx, qcs8300-ride-sx, qcs6490-rb3gen2]
    env:
      MACHINE: ${{ matrix.machine }}

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      # Clone job_render into the parent of the workspace so ../job_render exists
      - name: Clone job_render (public) into workspace
        shell: bash
        run: |
          set -euo pipefail
          JR="$GITHUB_WORKSPACE/job_render"
          if [[ ! -d "$JR/.git" ]]; then
            git clone https://github.com/qualcomm-linux/job_render "$JR"
          else
            echo "job_render already present in workspace"
          fi
          echo "JR_PATH=$JR" >> "$GITHUB_ENV"
          ls -la "$JR"

      # Optional: verify the generator script exists (handles naming differences)
      - name: Verify generator script
        shell: bash
        run: |
          set -euo pipefail
          JR="$GITHUB_WORKSPACE/../job_render"
          if [[ -f "$JR/lava_Job_definition_generator.py" ]]; then
            echo "Found: lava_Job_definition_generator.py"
          elif [[ -f "$JR/lava_job_definition_generator.py" ]]; then
            echo "Found: lava_job_definition_generator.py"
          else
            echo "Generator script not found in $JR" >&2
            ls -la "$JR" || true
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize DOCKER_IMAGE
        shell: bash
        run: |
          set -euo pipefail
          img="${{ inputs.docker_image }}"
          if [[ "$img" != */* ]]; then
            img="ghcr.io/qualcomm-linux-stg/$img"
          fi
          echo "DOCKER_IMAGE=$img" >> "$GITHUB_ENV"
          echo "Normalized image: $img"

      - name: Verify image string and pull
        shell: bash
        run: |
          echo "DOCKER_IMAGE=$DOCKER_IMAGE"
          docker pull "$DOCKER_IMAGE"

      - name: Download presigned_urls.json artifact
        uses: actions/download-artifact@v4
        with:
          name: presigned_urls.json
          path: presigned_urls

      - name: Stage manifest
        shell: bash
        run: |
          set -euo pipefail
          src="$(ls -1 presigned_urls/* 2>/dev/null | head -n1 || true)"
          if [[ -z "$src" ]]; then
            echo "No files under presigned_urls/ — ensure this workflow runs in the same run as the build." >&2
            exit 1
          fi
          cp "$src" "$GITHUB_WORKSPACE/presigned_urls.json"
          echo "Manifest at $GITHUB_WORKSPACE/presigned_urls.json"

      - name: Set LAVA_NAME
        shell: bash
        run: |
          set -euo pipefail
          case "${MACHINE}" in
            qcs9100-ride-sx) lava="qcs9100-ride-lava" ;;
            qcs8300-ride-sx) lava="qcs8300-ride-lava" ;;
            qcs6490-rb3gen2) lava="qcs6490-rb3gen2-lava" ;;
            *) echo "Unknown MACHINE ${MACHINE}" >&2; exit 1 ;;
          esac
          echo "LAVA_NAME=$lava" >> "$GITHUB_ENV"
          echo "Set LAVA_NAME=$lava"

      - name: Render job using composite
        id: render
        uses: qualcomm-linux-stg/video-driver/.github/actions/lava_job_render@workflow_2
        with:
          docker_image: ${{ inputs.docker_image }}
          s3_bucket: qli-stg-video-gh-artifacts
        env:
          MACHINE: ${{ env.MACHINE }}
          LAVA_NAME: ${{ env.LAVA_NAME }}

      - name: Locate rendered job definition (YAML or JSON)
        id: locate_def
        shell: bash
        run: |
          set -euo pipefail
          work="$GITHUB_WORKSPACE/../job_render"
          yaml="$work/renders/lava_job_definition.yaml"
          json="$work/renders/${MACHINE}.json"
          if [[ -s "$yaml" ]]; then
            echo "path=$yaml" >> "$GITHUB_OUTPUT"
            echo "fmt=YAML" >> "$GITHUB_OUTPUT"
            echo "Using YAML: $yaml"
          elif [[ -s "$json" ]]; then
            echo "path=$json" >> "$GITHUB_OUTPUT"
            echo "fmt=JSON" >> "$GITHUB_OUTPUT"
            echo "Using JSON: $json"
          else
            echo "No job definition found. Contents of $work/renders:" >&2
            ls -l "$work/renders" || true
            exit 1
          fi

      - name: Submit LAVA job via lavacli
        id: submit
        env:
          LAVA_USER: ${{ secrets.LAVA_OSS_USER }}
          LAVA_TOKEN: ${{ secrets.LAVA_OSS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          work="$GITHUB_WORKSPACE/../job_render"
          def="${{ steps.locate_def.outputs.path }}"
          echo "Submitting: $def"
          job_id=$(docker run -i --rm \
            -e LAVA_USER -e LAVA_TOKEN \
            -v "$work":"$work" -w "$work" \
            "$DOCKER_IMAGE" sh -c '\
              set -e; \
              lavacli identities add --token "$LAVA_TOKEN" --uri https://lava-oss.qualcomm.com/RPC2 --username "$LAVA_USER" production >/dev/null 2>&1 || true; \
              lavacli -i production jobs submit "$def" \
            ')
          job_id="$(echo -n "$job_id" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [[ -z "$job_id" ]]; then
            echo "lavacli did not return a job id"
            exit 1
          fi
          job_url="https://lava-oss.qualcomm.com/scheduler/job/$job_id"
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
          echo "job_url=$job_url" >> "$GITHUB_OUTPUT"
          echo "Submitted: $job_url"

      - name: Poll LAVA job status (lavacli)
        id: poll
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          job_id="${{ steps.submit.outputs.job_id }}"
          if [[ -z "$job_id" || "$job_id" == "null" ]]; then
            echo "No job_id from submit step."
            echo "status=UNKNOWN" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Polling job $job_id"
          STATE=""
          for i in {1..60}; do
            out=$(docker run -i --rm \
              -e LAVA_USER="${{ secrets.LAVA_OSS_USER }}" \
              -e LAVA_TOKEN="${{ secrets.LAVA_OSS_TOKEN }}" \
              "$DOCKER_IMAGE" sh -c '\
                lavacli identities add --token "$LAVA_TOKEN" --uri https://lava-oss.qualcomm.com/RPC2 --username "$LAVA_USER" production >/dev/null 2>&1 || true; \
                lavacli -i production jobs show '"$job_id"' \
              ')
            state_line=$(echo "$out" | grep -i '^state' || true)
            STATE=$(echo "$state_line" | cut -d':' -f2- | sed 's/^ *//;s/ *$//')
            echo "Attempt $i: state=$STATE"
            if [[ "$STATE" == "Finished" ]]; then
              break
            fi
            sleep 30
          done
          HEALTH="UNKNOWN"
          if [[ "$STATE" == "Finished" ]]; then
            health_line=$(docker run -i --rm \
              -e LAVA_USER="${{ secrets.LAVA_OSS_USER }}" \
              -e LAVA_TOKEN="${{ secrets.LAVA_OSS_TOKEN }}" \
              "$DOCKER_IMAGE" sh -c '\
                lavacli identities add --token "$LAVA_TOKEN" --uri https://lava-oss.qualcomm.com/RPC2 --username "$LAVA_USER" production >/dev/null 2>&1 || true; \
                lavacli -i production jobs show '"$job_id"' \
              ' | grep -i '^Health' || true)
            HEALTH=$(echo "$health_line" | cut -d':' -f2- | sed 's/^ *//;s/ *$//')
            echo "Final Health: $HEALTH"
          fi
          if [[ "$HEALTH" == "Complete" ]]; then
            echo "status=PASS" >> "$GITHUB_OUTPUT"
          elif [[ "$STATE" != "Finished" ]]; then
            echo "status=UNKNOWN" >> "$GITHUB_OUTPUT"
          else
            echo "status=FAIL" >> "$GITHUB_OUTPUT"
          fi

      - name: Update summary and result
        if: always()
        shell: bash
        run: |
          st="${{ steps.poll.outputs.status }}"
          echo "Machine: ${MACHINE}" >> "$GITHUB_STEP_SUMMARY"
          echo "Job: ${{ steps.submit.outputs.job_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Status: ${st}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -z "$st" ]]; then
            echo "LAVA job status unknown (empty)."; exit 1
          fi
          if [[ "$st" != "PASS" ]]; then
            echo "LAVA job did not pass"; exit 1
          fi