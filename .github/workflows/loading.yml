---
name: _loading
description: Load required parameters for the subsequent jobs

on:
  workflow_call:
    inputs:
      target_branch:
        description: "Branch to checkout (optional)"
        required: false
        type: string
        default: ""
    outputs:
      build_matrix:
        description: Build matrix
        value: ${{ jobs.loading.outputs.build_matrix }}
      full_matrix:
        description: Full Matrix containing lava description
        value: ${{ jobs.loading.outputs.full_matrix }}

jobs:
  loading:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.loading.outputs.build_matrix }}
      full_matrix: ${{ steps.loading.outputs.full_matrix }}
    steps:

      # ✅ STEP 1: Always checkout base branch first
      # For PR events: use github.base_ref (e.g. video.qclinux.main.stage)
      # For push/schedule: use inputs.target_branch or github.ref_name
      - name: Checkout Base Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || (github.event_name == 'pull_request' && github.base_ref) || github.ref_name }}
          # No path: here — files land directly in GITHUB_WORKSPACE

      # ✅ STEP 2: If PR event, merge PR head on top of base
      - name: Sync PR Head into Base (PR only)
        if: github.event_name == 'pull_request'
        uses: qualcomm-linux-stg/video-driver/.github/actions/sync@video.qclinux.main.stage
        with:
          event_name: ${{ github.event_name }}
          pr_ref: ${{ github.event.pull_request.head.ref }}
          pr_repo: ${{ github.event.pull_request.head.repo.full_name }}
          base_ref: ${{ github.base_ref }}

      # ✅ STEP 3: Load parameters
      - name: Load Parameters
        id: loading
        uses: qualcomm-linux-stg/video-driver/.github/actions/loading@video.qclinux.main.stage