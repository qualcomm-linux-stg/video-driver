name: pre_merge
description: |
  Orchestrates pre-merge CI - Build phase only (safe, no secrets)

on:
  push:
    branches:
      - video.qclinux.main.stage
  workflow_dispatch:
  pull_request:                          # ✅ Changed from pull_request_target
    types: [opened, synchronize, reopened]
    branches:
      - video.qclinux.main.stage

jobs:
  loading:
    uses: qualcomm-linux-stg/video-driver/.github/workflows/loading.yml@video.qclinux.main.stage
    # ⚠️ No "secrets: inherit" here — loading doesn't need secret

  build:
    needs: loading
    uses: qualcomm-linux-stg/video-driver/.github/workflows/sync-and-build.yml@video.qclinux.main.stage
    # ⚠️ No "secrets: inherit" here — build should not have secret access
    with:
      docker_image: kmake-image:ver.1.0
      build_matrix: ${{ needs.loading.outputs.build_matrix }}
