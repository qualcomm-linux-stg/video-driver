name: pre_merge
run-name: Pre Merge Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - meta-qcom_full-build
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - meta-qcom_full-build

jobs:
  loading:
    uses: qualcomm-linux/video-driver/.github/workflows/loading.yml@meta-qcom_full-build
    secrets: inherit

  build:
    needs: loading
    uses: qualcomm-linux/video-driver/.github/workflows/sync-and-build.yml@meta-qcom_full-build
    secrets: inherit
    with:
      build_matrix: ${{ needs.loading.outputs.build_matrix }}
      docker_image: video-image:ver.1.0