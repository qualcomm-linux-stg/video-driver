name: pre_merge
run-name: Pre Merge Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - video.qclinux.main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - video.qclinux.main

jobs:
  loading:
    uses: ./.github/workflows/loading.yml
    secrets: inherit

  build:
    needs: loading
    uses: ./.github/workflows/sync-and-build.yml
    secrets: inherit
    with:
      build_matrix: ${{ needs.loading.outputs.build_matrix }}
      docker_image: kmake-image:ver.1.0