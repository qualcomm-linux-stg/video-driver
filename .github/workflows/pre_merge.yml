name: pre_merge
description: |
  Orchestrates pre-merge CI for the video-driver repository a matrix
  in the caller workflow. Builds and tests using reusable workflows.

on:
  push:
    branches:
      - final-changes
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - final-changes

jobs:
  loading:
    uses: qualcomm-linux-stg/video-driver/.github/workflows/loading.yml@final-changes
    secrets: inherit

  build:
    needs: loading
    uses: qualcomm-linux-stg/video-driver/.github/workflows/sync-and-build.yml@final-changes
    secrets: inherit
    with:
      docker_image: ghcr.io/qualcomm-linux-stg/videodriver-image:ver.1.0
      build_matrix: ${{ needs.loading.outputs.build_matrix }}

  lava-test:
    needs: [loading, build]
    uses: qualcomm-linux-stg/video-driver/.github/workflows/test.yml@final-changes
    secrets: inherit
    with:
      docker_image: ghcr.io/qualcomm-linux-stg/videodriver-image:ver.1.0
      build_matrix: ${{ needs.loading.outputs.build_matrix }}
      full_matrix: ${{ needs.loading.outputs.full_matrix }}
