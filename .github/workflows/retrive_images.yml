name: Retrieve and Inject

on:
  workflow_dispatch:
    inputs:
      build_matrix:
        description: JSON string of machine matrix
        required: false
        type: string
      s3_run_id:
        description: S3 run ID folder (e.g., 18077083816-1)
        required: true
        type: string

  repository_dispatch:
    types: [trigger-retrieve-inject]
    
  push:
    branches:
      - test-workflow

jobs:
  inject:
    runs-on:
      group: GHA-Video-Stg-SelfHosted-RG
      labels: [self-hosted, video-stg-u2204-x64-large-od-ephem]
    strategy:
      fail-fast: false
      matrix:
        build_matrix: ${{ fromJson(inputs.build_matrix || github.event.client_payload.build_matrix) }}

    env:
      S3_BUCKET: qli-stg-video-gh-artifacts
      S3_RUN_ID: ${{ inputs.s3_run_id || github.event.client_payload.s3_run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .qcomflash manifest from S3
        uses: qualcomm-linux-stg/video-driver/.github/actions/aws_s3_helper@test-workflow
        with:
          s3_bucket: ${{ env.S3_BUCKET }}
          mode: download
          download_file: qualcomm-linux-stg/video-driver/${{ env.S3_RUN_ID }}/file_list.txt
          download_location: ${{ github.workspace }}/artifacts
          machine: ${{ matrix.build_matrix.machine }}

      - name: Download all .qcomflash image files from S3
        run: |
          mkdir -p ${{ github.workspace }}/retrieved_images
          while IFS= read -r file; do
            filename=$(basename "$file")
            aws s3 cp s3://${{ env.S3_BUCKET }}/qualcomm-linux-stg/video-driver/${{ env.S3_RUN_ID }}/"$filename" ${{ github.workspace }}/retrieved_images/
          done < ${{ github.workspace }}/artifacts/file_list.txt

      - name: Download iris_v4l2_test binary from S3
        uses: qualcomm-linux-stg/video-driver/.github/actions/aws_s3_helper@test-workflow
        with:
          s3_bucket: ${{ env.S3_BUCKET }}
          mode: download
          download_file: qualcomm-linux-stg/video-driver/${{ env.S3_RUN_ID }}/iris_v4l2_test
          download_location: ${{ github.workspace }}/retrieved_test_app
          machine: iris_v4l2_test

      - name: Inject iris_v4l2_test into rootfs image
        run: |
          set -e
          ROOTFS_IMG=$(find ${{ github.workspace }}/retrieved_images -name '*rootfs.img' | head -n 1)
          IRIS_BINARY="${{ github.workspace }}/retrieved_test_app/iris_v4l2_test"

          if [ ! -f "$ROOTFS_IMG" ]; then
            echo "❌ rootfs.img not found. Aborting."
            exit 1
          fi
          if [ ! -f "$IRIS_BINARY" ]; then
            echo "❌ iris_v4l2_test binary not found. Aborting."
            exit 1
          fi

          echo "🔧 Mounting rootfs image..."
          mkdir -p ~/system_mount
          if ! sudo mount -o loop "$ROOTFS_IMG" ~/system_mount; then
            echo "⚠️ Mount failed, attempting journal recovery..."
            sudo e2fsck -f "$ROOTFS_IMG"
            sudo mount -o loop "$ROOTFS_IMG" ~/system_mount
          fi

          echo "📦 Injecting iris_v4l2_test..."
          sudo mkdir -p ~/system_mount/data/vendor/iris_test_app/input
          sudo mkdir -p ~/system_mount/data/vendor/iris_test_app/output
          sudo cp "$IRIS_BINARY" ~/system_mount/data/vendor/iris_test_app/
          sudo chmod +x ~/system_mount/data/vendor/iris_test_app/iris_v4l2_test

          echo "🧹 Unmounting and cleaning up..."
          sudo umount ~/system_mount
          rm -rf ~/system_mount

      - name: Update summary
        if: success() || failure()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            summary="✅ Injection completed for ${{ matrix.build_matrix.machine }}"
          else
            summary="❌ Injection failed for ${{ matrix.build_matrix.machine }}"
          fi
          echo -e "<details><summary><i>Injection Summary</i></summary>\n${summary}\n</details>" >> $GITHUB_STEP_SUMMARY
