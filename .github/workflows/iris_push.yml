name: IRIS App Injection

on:
  workflow_dispatch:
  push:
    branches:
      - test-workflow

jobs:
  inject:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        machines: [qcs9100-ride-sx, qcs8300-ride-sx]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Prepare workspace
        run: |
          echo "Preparing workspace for IRIS injection..."
          mkdir -p ${{ github.workspace }}/meta-qcom/build/tmp/deploy/images

      - name: Run IRIS injection for ${{ matrix.machines }}
        run: |
          ls
          pwd
          echo "Injecting IRIS app into image for ${{ matrix.machines }}..."
          sudo bash ci/inject_iris_app.sh \
            --image-dir ${{ github.workspace }}/meta-qcom/build/tmp/deploy/images \
            --machine ${{ matrix.machines }}


