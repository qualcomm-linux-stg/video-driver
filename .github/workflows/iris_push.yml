name: IRIS App Injection

on:
  workflow_dispatch:
  push:
    branches:
      - test-workflow

jobs:
  inject:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        machines: [qcs9100-ride-sx, qcs8300-ride-sx]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run IRIS injection inside Docker
        run: |
          echo "Injecting IRIS app into image for ${{ matrix.machines }}..."
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            kas_dependencies \
            bash -c "apt-get update && apt-get install -y e2fsprogs sudo && \
              bash ci/inject_iris_app.sh \
              --image-dir /workspace/meta-qcom/build/tmp/deploy/images \
              --machine ${{ matrix.machines }}"
