name: Sync and Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      docker_image:
        description: Docker image to use for the build
        required: false
        type: string
        default: kmake-image:ver.1.0
      build_matrix:
        description: Build matrix for multi target builds
        type: string
        required: true

permissions:
  packages: read
  contents: read # Required for checkout

jobs:
  sync-and-build:
    runs-on: 
      group: GHA-video-Stg-SelfHosted-RG
      labels: [self-hosted, video-stg-u2204-x64-large-od-ephem]

    steps:
      - name: Pull Docker image
        uses: qualcomm-linux/kernel-config/.github/actions/pull_docker_image@main
        with:
          image: ${{ inputs.docker_image }}

      # ------------------------------------------------------------------------
      # ✅ CRITICAL FIX: Explicitly checkout the driver code.
      # This ensures the source code exists for Post-Merge/Scheduled runs.
      # ------------------------------------------------------------------------
      - name: Checkout Video Driver
        uses: actions/checkout@v4
        with:
          path: video-driver
          fetch-depth: 0 

      - name: Sync codebase
        uses: qualcomm-linux-stg/video-driver/.github/actions/sync@video.qclinux.0.0
        with:
          event_name: ${{ github.event_name }}
          pr_ref: ${{ github.event.pull_request.head.ref }}
          pr_repo: ${{ github.event.pull_request.head.repo.full_name }}
          base_ref: ${{ github.ref_name }}
          caller_workflow: build

      - name: Fix Permissions for Docker Build
        shell: bash
        run: |
          echo "🔧 Adjusting workspace permissions before build..."
          sudo chmod -R 777 ${{ github.workspace }}

      - name: Build workspace
        uses: qualcomm-linux-stg/video-driver/.github/actions/build@video.qclinux.0.0
        with:
          docker_image: kmake-image:ver.1.0
          workspace_path: ${{ github.workspace }}

      # ------------------------------------------------------------------------
      # ✅ CRITICAL FIX: Reset ownership immediately after build.
      # This prevents "Permission denied" errors during job cleanup.
      # ------------------------------------------------------------------------
      - name: Fix Workspace Ownership
        if: always()
        shell: bash
        run: |
          echo "🔧 Fixing file ownership (root -> runner user)..."
          sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}

      - name: Download iris_test_app from S3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/v4l-video-test-app/build/"
          echo "📥 Syncing iris_test_app..."
          aws s3 sync "s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/iris_test_app/" "${{ github.workspace }}/v4l-video-test-app/build/"

      - name: Download firmware file from S3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/downloads"
          echo "📥 Syncing firmware artifacts..."
          aws s3 sync "s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/" "${{ github.workspace }}/downloads"
          [ -f "${{ github.workspace }}/downloads/vpu20_1v.mbn" ] || { echo "❌ Missing vpu20_1v.mbn"; exit 1; }

      - name: Download video-contents for testing
        shell: bash 
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/downloads"
          echo "📥 Downloading video_clips_iris.tar.gz..."
          wget -q https://github.com/qualcomm-linux/qcom-linux-testkit/releases/download/IRIS-Video-Files-v1.0/video_clips_iris.tar.gz \
               -O "${{ github.workspace }}/downloads/video_clips_iris.tar.gz"
          [ -f "${{ github.workspace }}/downloads/video_clips_iris.tar.gz" ] || { echo "❌ Failed to download video content"; exit 1; }

      - name: Prepare /data/vendor/iris_test_app and list contents
        shell: bash
        run: |
          set -euo pipefail
          # Ensure directories exist
          mkdir -p "${{ github.workspace }}/kobj/tar-install/data/vendor/iris_test_app/firmware"
          
          # Find firmware version
          if [ -d "kobj/tar-install/lib/modules/" ]; then
             firmware_version=$(ls kobj/tar-install/lib/modules/ | head -n 1)
             if [ -z "$firmware_version" ]; then echo "❌ No modules found in kobj/tar-install/lib/modules/"; exit 1; fi
          else
             echo "❌ Module directory not found"
             exit 1
          fi

          mkdir -p "kobj/tar-install/lib/modules/$firmware_version/updates"
          
          # Handle .ko file location (checked out repo vs root)
          if [ -f "video-driver/iris_vpu.ko" ]; then
            cp video-driver/iris_vpu.ko kobj/tar-install/lib/modules/$firmware_version/updates/
          elif [ -f "iris_vpu.ko" ]; then
             cp iris_vpu.ko kobj/tar-install/lib/modules/$firmware_version/updates/
          else
             echo "⚠️ iris_vpu.ko not found. Build may have failed silently."
          fi

          # Copy artifacts
          cp "v4l-video-test-app/build/iris_v4l2_test" "kobj/tar-install/data/vendor/iris_test_app/"
          cp "${{ github.workspace }}/downloads/vpu20_1v.mbn" "kobj/tar-install/data/vendor/iris_test_app/firmware/"
          cp "${{ github.workspace }}/downloads/video_clips_iris.tar.gz" "kobj/tar-install/data/vendor/iris_test_app/"

      - name: Create compressed kernel ramdisk archives
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/kobj/tar-install"
          find lib/modules data | cpio -o -H newc --owner=0:0 | gzip -9 > "${{ github.workspace }}/local-kernel-ramdisk.cpio.gz"

      - name: Download meta-qcom stable initramfs artifacts from S3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/downloads"
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-kerneltest-full-image-qcom-armv8a.cpio.gz "${{ github.workspace }}/downloads/"

      - name: Decompress ramdisk files and rename
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/downloads"
          gunzip -c initramfs-kerneltest-full-image-qcom-armv8a.cpio.gz > kerneltest.cpio

      - name: Merge and repackage initramfs
        shell: bash
        run: |
          set -euo pipefail
          workspace="${{ github.workspace }}"
          mkdir -p "$workspace/combineramdisk"
          cp "$workspace/local-kernel-ramdisk.cpio.gz" "$workspace/combineramdisk/"
          
          cd "$workspace/combineramdisk"
          mv local-kernel-ramdisk.cpio.gz local-kernel-ramdisk.cpio.gz.bak
          gunzip -c local-kernel-ramdisk.cpio.gz.bak > local-kernel-ramdisk.cpio
          cp "$workspace/downloads/kerneltest.cpio" .
          
          # Merge Logic
          cat kerneltest.cpio local-kernel-ramdisk.cpio > video-merged.cpio
          gzip -9 video-merged.cpio
          
          # Repackage to clean up duplicates
          mkdir -p temp_merge
          cd temp_merge
          cpio -id --no-absolute-filenames < ../kerneltest.cpio
          cpio -id --no-absolute-filenames < ../local-kernel-ramdisk.cpio
          
          find . | cpio -o -H newc --owner=0:0 > ../video-merged.cpio
          cd ..
          gzip -f -9 video-merged.cpio
          rm -rf temp_merge kerneltest.cpio local-kernel-ramdisk.cpio

      - name: Validate build_matrix and jq
        shell: bash
        run: |
          set -euo pipefail
          machines_json='${{ inputs.build_matrix }}'
          if ! command -v jq >/dev/null 2>&1; then
            echo "❌ jq is not installed."
            exit 1
          fi
          echo "$machines_json" | jq -e . >/dev/null

      - name: Append artifacts to S3 upload list
        shell: bash
        run: |
          set -euo pipefail
          workspace="${{ github.workspace }}"
          file_list="$workspace/artifacts/file_list.txt"
          mkdir -p "$workspace/artifacts"
          
          # Archive Modules
          tar -C "$workspace/kobj/tar-install" \
              --exclude='lib/modules/*/build' \
              --exclude='lib/modules/*/source' \
              --numeric-owner --owner=0 --group=0 \
              -cJf "$workspace/modules.tar.xz" lib/modules
          
          echo "$workspace/modules.tar.xz" >> "$file_list"
          echo "$workspace/kobj/arch/arm64/boot/Image" >> "$file_list"
          echo "$workspace/kobj/vmlinux" >> "$file_list"
          echo "$workspace/combineramdisk/video-merged.cpio.gz" >> "$file_list"
          
          # DTBs
          machines='${{ inputs.build_matrix }}'
          for machine in $(echo "$machines" | jq -r '.[].machine'); do
            dtb="$workspace/kobj/arch/arm64/boot/dts/qcom/${machine}.dtb"
            [ -f "$dtb" ] && echo "$dtb" >> "$file_list"
          done
          
      - name: Upload all artifacts to S3
        uses: qualcomm-linux/video-driver/.github/actions/aws_s3_helper@video.qclinux.0.0
        with:
          s3_bucket: qli-stg-video-gh-artifacts
          local_file: ${{ github.workspace }}/artifacts/file_list.txt
          mode: multi-upload
          upload_location: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.run_id }}-${{ github.run_attempt }}

      - name: Clean up
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ws="${{ github.workspace }}"
          echo "🧹 Cleaning up..."
          sudo rm -rf "$ws/artifacts" "$ws/combineramdisk" "$ws/downloads" "$ws/kobj" || true
          sudo rm -f "$ws/modules.tar.xz" "$ws/local-kernel-ramdisk.cpio.gz" || true
          
      - name: Update summary
        if: success() || failure()
        shell: bash
        run: |
          if [ "${{ steps.build_workspace.outcome }}" = "success" ]; then
            echo "✅ Build Success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Build Failed" >> "$GITHUB_STEP_SUMMARY"
          fi