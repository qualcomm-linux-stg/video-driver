name: Sync and Build

on:
  push:
    branches:
      - workflow_2
  workflow_dispatch:

permissions:
  packages: read

jobs:
  sync-and-build:
    runs-on: 
      group: GHA-video-Stg-SelfHosted-RG
      labels: [self-hosted, video-stg-u2204-x64-large-od-ephem]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: qualcomm-linux-stg/video-driver/.github/actions/build_docker_image@workflow_2
        with:
          image: ghcr.io/qualcomm-linux-stg/kmake-video-image:ver.1.0

      - name: Sync codebase
        uses: qualcomm-linux-stg/video-driver/.github/actions/sync@workflow_2
        with:
          workspace_path: ${{ github.workspace }}

      - name: Build workspace
        uses: qualcomm-linux-stg/video-driver/.github/actions/build@workflow_2
        with:
          docker_image: ghcr.io/qualcomm-linux-stg/kmake-video-image:ver.1.0
          workspace_path: ${{ github.workspace }}

      - name: Generate Iris test app
        uses: qualcomm-linux-stg/video-driver/.github/actions/generate_iris_test_app@workflow_2
        with:
          docker_image: ghcr.io/qualcomm-linux-stg/kmake-video-image:ver.1.0

      - name: Print full workspace contents
        run: |
          echo "📂 Full workspace contents:"
          find ${{ github.workspace }} -type f -exec ls -lh {} \;
      

      - name: Copy driver and test app to target directories and list contents
        run: |
          # Create the updates directory if it doesn't exist
          mkdir -p workspace/kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates

          # Copy iris_vpu.ko to the updates directory
          cp workspace/video-driver/iris_vpu.ko workspace/kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/

          # Copy iris_v4l2_test into the updates directory
          cp workspace/video-test-app/build/iris_v4l2_test workspace/kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/

          # Print contents of the updates directory
          echo "📂 Contents of updates directory:"
          ls -lh kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/

      - name: Download latest initramfs images
        run: |
          BASE_URL="https://quic-yocto-fileserver-1029608027416.us-central1.run.app/qualcomm-linux/meta-qcom/18703085540-1/qcom-distro/qcom-armv8a/"
          latest_run=$(curl -s $BASE_URL | grep -oP '(?<=href=")[^"/]+/' | sort | tail -n 1)
          echo "Latest run folder: $latest_run"
          wget "${BASE_URL}${latest_run}initramfs-firmware-qcs8300-ride-image-qcom-armv8a.cpio"
          wget "${BASE_URL}${latest_run}initramfs-kerneltest-full-image-qcom-armv8a.cpio"

      - name: Download firmware file from s3
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/downloads
          echo "📥 Syncing files from S3 path: s3://qli-prd-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/"
          aws s3 sync s3://qli-prd-video-gh-artifacts/qualcomm-linux/video-driver/artifacts/ ${{ github.workspace }}/downloads
          echo "✅ Download complete."
      
