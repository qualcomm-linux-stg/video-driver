name: Sync and Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      docker_image:
        description: Docker image to use for the build
        required: false
        type: string
        default: kmake-image:ver.1.0

permissions:
  packages: read

jobs:
  sync-and-build:
    runs-on: 
      group: GHA-video-Stg-SelfHosted-RG
      labels: [self-hosted, video-stg-u2204-x64-large-od-ephem]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Build Docker image
      #   uses: qualcomm-linux-stg/video-driver/.github/actions/build_docker_image@workflow_2
      #   with:
      #     image: kmake-image:ver.1.0
      - name: Pull Docker image
        uses: qualcomm-linux/kernel-config/.github/actions/pull_docker_image@main
        with:
          image: ${{ inputs.docker_image }}
      
      - name: Sync codebase
        uses: qualcomm-linux-stg/video-driver/.github/actions/sync@workflow_2
        with:
          workspace_path: ${{ github.workspace }}

      - name: Build workspace
        uses: qualcomm-linux-stg/video-driver/.github/actions/build@workflow_2
        with:
          docker_image: kmake-image:ver.1.0
          workspace_path: ${{ github.workspace }}

      - name: Generate Iris test app
        uses: qualcomm-linux-stg/video-driver/.github/actions/generate_iris_test_app@workflow_2
        with:
          docker_image: kmake-image:ver.1.0

      # - name: Print full workspace contents
      #   run: |
      #     echo "📂 Full workspace contents:"
      #     find ${{ github.workspace }} -type f -exec ls -lh {} \;
        
      # - name: print the workspace
      #   run: |
      #     echo "📍 Current workspace directory:"
      #     pwd
        
      - name: Download firmware file from s3
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/downloads
          echo "📥 Syncing files from S3 path: s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/"
          aws s3 sync s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/ ${{ github.workspace }}/downloads
          echo "✅ Download complete"

      - name : Download the video-contents for testing
        shell: bash 
        run: |
             mkdir -p ${{ github.workspace }}/downloads
             mkdir -p ${{ github.workspace }}/downloads/video_clips_iris
             echo " Downloading the video-content files"
             wget https://github.com/qualcomm-linux/qcom-linux-testkit/releases/download/IRIS-Video-Files-v1.0/video_clips_iris.tar.gz -O ${{ github.workspace }}/downloads/video_clips_iris.tar.gz
             tar -xvzf ${{ github.workspace }}/downloads/video_clips_iris.tar.gz -C  ${{ github.workspace }}/downloads/video_clips_iris

      - name: Copy driver and test app to target directories and list contents
        run: |
           #Create the updates directory if it doesn't exist
          firmware_version=$(ls kobj/tar-install/lib/modules/)
          mkdir -p "kobj/tar-install/lib/modules/$firmware_version/updates"

          # Copy iris_vpu.ko to the updates directory
          cp video-driver/iris_vpu.ko kobj/tar-install/lib/modules/$firmware_version/updates/

          # Copy iris_v4l2_test into the updates directory
          cp v4l-video-test-app/build/iris_v4l2_test kobj/tar-install/lib/modules/$firmware_version/updates/

          cp downloads/vpu20_1v.mbn kobj/tar-install/lib/modules/$firmware_version/updates/

          cp -r downloads/video_clips_iris kobj/tar-install/lib/modules/$firmware_version/updates/

          # Print contents of the updates directory
          echo "📂 Contents of updates directory:"
          ls -lh kobj/tar-install/lib/modules/$firmware_version/updates/
          
          #  Create the updates directory if it doesn't exist
          # firmware_version=$(ls kobj/tar-install/lib/modules/)
          # mkdir -p "kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates"

          #  Copy iris_vpu.ko to the updates directory
          # cp video-driver/iris_vpu.ko kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/

          #  Copy iris_v4l2_test into the updates directory
          # cp v4l-video-test-app/build/iris_v4l2_test kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/

          # cp downloads/vpu20_1v.mbn kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/

          # cp downloads/video_clips_iris/720p_AVC.h264 kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/

          #  Print contents of the updates directory
          # echo "📂 Contents of updates directory:"
          # ls -lh kobj/tar-install/lib/modules/6.17.0-00264-g7c504609df4a/updates/
      
      - name: Create compressed kernel ramdisk archives for all machines
        run: |
            # Define target folders
            for machine in qcs9100-ride-sx qcs8300-ride-sx qcs6490-rb3gen2; do
            echo "📁 Creating archive for $machine"

            # Create the machine-specific directory
            mkdir -p "$machine"

            # Generate the compressed cpio archive
            cd kobj/tar-install
            find lib/modules | cpio -o -H newc -R +0:+0 | gzip -9 > "../../$machine/local-kernel-ramdisk.cpio.gz"
            cd - > /dev/null

            # Confirm the archive was created
            echo "📦 Archive for $machine:"
            ls -lh "$machine/local-kernel-ramdisk.cpio.gz"
            done
      
      - name: Copy the common local-kernel-ramdisk to workspace
        shell: bash
        run: |
          set -e
          src="${{ github.workspace }}/qcs9100-ride-sx/local-kernel-ramdisk.cpio.gz"
          dest="${{ github.workspace }}/local-kernel-ramdisk.cpio.gz"
          if [ ! -f "$src" ]; then
            echo "❌ Not found: $src"
            exit 1
          fi
          cp "$src" "$dest"
          echo "✅ Copied: $src -> $dest"
          ls -lh "${{ github.workspace }}/"local-kernel-ramdisk.cpio.gz

      
      - name: Download meta-qcom stable initramfs artifacts from S3
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/downloads
          echo "🔍 Fetching initramfs files from S3 bucket: s3://qli-stg-video-gh-artifacts/linux-stg/video-driver/artifacts/initramfs/"
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-firmware-qcs8300-ride-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-firmware-rb3gen2-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-firmware-sa8775p-ride-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          aws s3 cp s3://qli-stg-video-gh-artifacts/qualcomm-linux-stg/video-driver/artifacts/initramfs/initramfs-kerneltest-full-image-qcom-armv8a.cpio.gz ${{ github.workspace }}/downloads/
          echo "✅ All initramfs files downloaded to: ${{ github.workspace }}/downloads"


      - name: 📦 Decompress ramdisk files and rename .cpio.gz files
        shell: bash
        run: |
          cd ${{ github.workspace }}/downloads
          echo "📂 Decompressing and renaming .cpio.gz files..."

          gunzip -c initramfs-firmware-qcs8300-ride-image-qcom-armv8a.cpio.gz > firmware-qcs8300-ride-sx.cpio
          gunzip -c initramfs-firmware-rb3gen2-image-qcom-armv8a.cpio.gz > firmware-qcs6490-rb3gen2.cpio
          gunzip -c initramfs-firmware-sa8775p-ride-image-qcom-armv8a.cpio.gz > firmware-qcs9100-ride-sx.cpio
          gunzip -c initramfs-kerneltest-full-image-qcom-armv8a.cpio.gz > kerneltest.cpio

          echo "✅ Decompression complete."

      - name: 🗂️ Organize decompressed files into target directories
        shell: bash
        run: |
          cd ${{ github.workspace }}/downloads

          mkdir -p ../qcs9100-ride-sx ../qcs8300-ride-sx ../qcs6490-rb3gen2

          cp firmware-qcs9100-ride-sx.cpio ../qcs9100-ride-sx/
          cp kerneltest.cpio ../qcs9100-ride-sx/

          cp firmware-qcs8300-ride-sx.cpio ../qcs8300-ride-sx/
          cp kerneltest.cpio ../qcs8300-ride-sx/

          cp firmware-qcs6490-rb3gen2.cpio ../qcs6490-rb3gen2/
          cp kerneltest.cpio ../qcs6490-rb3gen2/

          echo "✅ Files copied to target directories."

      - name: 🔀 Merge and repackage initramfs for each machine
        shell: bash
        run: |
          for machine in qcs9100-ride-sx qcs8300-ride-sx qcs6490-rb3gen2; do
            echo "🔧 Processing $machine"

            cd ${{ github.workspace }}/$machine

            # Decompress local-kernel-ramdisk
            mv local-kernel-ramdisk.cpio.gz local-kernel-ramdisk.cpio.gz.bak
            gunzip -c local-kernel-ramdisk.cpio.gz.bak > local-kernel-ramdisk.cpio

            # Determine firmware file name
            firmware_file=""
            if [[ "$machine" == "qcs9100-ride-sx" ]]; then
              firmware_file="firmware-qcs9100-ride-sx.cpio"
            elif [[ "$machine" == "qcs8300-ride-sx" ]]; then
              firmware_file="firmware-qcs8300-ride-sx.cpio"
            elif [[ "$machine" == "qcs6490-rb3gen2" ]]; then
              firmware_file="firmware-qcs6490-rb3gen2.cpio"
            fi

            # Copy firmware and kerneltest from downloads
            cp ${{ github.workspace }}/downloads/$firmware_file .
            cp ${{ github.workspace }}/downloads/kerneltest.cpio .

            # Merge all components
            cat kerneltest.cpio local-kernel-ramdisk.cpio $firmware_file > ${machine}-merged.cpio
            gzip -9 ${machine}-merged.cpio

            # Create temp workspace to clean up archive
            mkdir -p temp_merge
            cd temp_merge
            cpio -id < ../kerneltest.cpio
            cpio -id < ../local-kernel-ramdisk.cpio
            cpio -id < ../$firmware_file
            cd ..

            # Remove old merged archive
            rm ${machine}-merged.cpio.gz

            # Repackage clean archive
            cd temp_merge
            find . | cpio -o -H newc > ../${machine}-merged.cpio
            cd ..
            gzip -9 ${machine}-merged.cpio

            # Cleanup
            #rm -rf temp_merge local-kernel-ramdisk.cpio kerneltest.cpio $firmware_file
            rm -rf temp_merge kerneltest.cpio $firmware_file
            echo "✅ Final archive: ${machine}-merged.cpio.gz"
            ls -lh ${machine}-merged.cpio.gz

            cd ${{ github.workspace }}
          done
      
      - name: 📂 List files in each machine directory
        shell: bash
        run: |
          for machine in qcs9100-ride-sx qcs8300-ride-sx qcs6490-rb3gen2; do
            echo "📁 Contents of $machine:"
            ls -lh ${{ github.workspace }}/$machine
            echo ""
          done

      - name: 🧱 Build boot.img for each machine using Docker
        shell: bash
        run: |
          machines=(qcs9100-ride-sx qcs8300-ride-sx qcs6490-rb3gen2)
          for machine in "${machines[@]}"; do
            echo "🚀 Building boot.img for $machine"
            # Set DTB filename based on machine
            case "$machine" in
              qcs9100-ride-sx) dtb="qcs9100-ride.dtb" ;;
              qcs8300-ride-sx) dtb="qcs8300-ride.dtb" ;;
              qcs6490-rb3gen2) dtb="qcs6490-rb3gen2.dtb" ;;
              *) echo "❌ Unknown machine: $machine"; exit 1 ;;
            esac
            # Run mkbootimg inside Docker container directly
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              --workdir "$PWD" \
              -v "$(dirname "$PWD")":"$(dirname "$PWD")" \
              kmake-image:ver.1.0 \
              mkbootimg \
                --header_version 2 \
                --ramdisk "$machine/${machine}-merged.cpio.gz" \
                --kernel "kobj/arch/arm64/boot/Image" \
                --dtb "kobj/arch/arm64/boot/dts/qcom/$dtb" \
                --cmdline "earlycon clk_ignore_unused pd_ignore_unused audit=0" \
                --base 0x80000000 \
                --pagesize 2048 \
                --output "$machine/${machine}-boot.img"
            echo "✅ Boot image created: $machine/${machine}-boot.img"
          done
            
      - name:  Final contents of each machine directory
        shell: bash
        run: |
          for machine in qcs9100-ride-sx qcs8300-ride-sx qcs6490-rb3gen2; do
           echo " 📁 Final contents of $machine:"
           ls -lh ${{ github.workspace }}/$machine
           echo ""
          done


      - name: 📦 Package boot.img for the s3 upload
        shell: bash
        run: |
          set -e
          workspace=${{ github.workspace }}
          mkdir -p "$workspace/artifacts"
          touch "$workspace/artifacts/file_list.txt"

          for machine in qcs9100-ride-sx qcs8300-ride-sx qcs6490-rb3gen2; do
            echo "📦 Creating tarball for $machine"

            bootimg_path="$workspace/$machine/${machine}-boot.img"
            if [ ! -f "$bootimg_path" ]; then
              echo "❌ Missing boot.img for $machine"
              exit 1
            fi

            tarball="${machine}_boot_payload.tar.gz"
            tar -czf "$workspace/$tarball" -C "$workspace/$machine" "${machine}-boot.img"
            echo "$workspace/$tarball" >> "$workspace/artifacts/file_list.txt"

            echo "✅ Tarball created: $tarball"
          done

      - name: Append Image/Vmlinux/per-machine DTBs and common ramdisk to S3 upload list
        shell: bash
        run: |
          set -euo pipefail
          workspace=${{ github.workspace }}
          file_list="$workspace/artifacts/file_list.txt"
          ramdisk="$workspace/local-kernel-ramdisk.cpio.gz"

          # Ensure the list exists (created by your packaging step)
          if [ ! -f "$file_list" ]; then
            echo "❌ Missing $file_list. Ensure the packaging step ran successfully."
            exit 1
          fi

          # Ensure the common ramdisk exists
          if [ ! -f "$ramdisk" ]; then
            echo "❌ Missing common ramdisk at: $ramdisk"
            exit 1
          fi

          # Package lib/modules (xz-compressed)
          mod_root="$workspace/kobj/tar-install/lib/modules"
          if [ ! -d "$mod_root" ]; then
            echo "❌ Missing directory: $mod_root"
            exit 1
          fi
          tar -C "$workspace/kobj/tar-install" -cJf "$workspace/modules.tar.xz" lib/modules
          echo "$workspace/modules.tar.xz" >> "$file_list"
          echo "✅ Queued for upload: $workspace/modules.tar.xz"

          # Queue common kernel artifacts
          IMAGE_PATH="$workspace/kobj/arch/arm64/boot/Image"
          VMLINUX_PATH="$workspace/kobj/vmlinux"
          for f in "$IMAGE_PATH" "$VMLINUX_PATH" "$ramdisk"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing expected file: $f"
              exit 1
            fi
            echo "$f" >> "$file_list"
            echo "✅ Queued for upload: $f"
          done

          # Queue per-machine DTBs by pattern
          dtb_dir="$workspace/kobj/arch/arm64/boot/dts/qcom"
          declare -A DTB_PATTERNS=(
            ["qcs9100-ride-sx"]="sa8775p-ride.dtb"
            ["qcs8300-ride-sx"]="qcs8300-ride.dtb"
            ["qcs6490-rb3gen2"]="qcs6490-rb3gen2.dtb"
          )
          for machine in "${!DTB_PATTERNS[@]}"; do
            pat="${DTB_PATTERNS[$machine]}"
            dtb_path="$(ls "$dtb_dir"/$pat 2>/dev/null | head -n1 || true)"
            if [ -z "$dtb_path" ]; then
              echo "❌ No DTB matched pattern '$pat' in $dtb_dir for $machine"
              echo "Available DTBs:"
              ls -1 "$dtb_dir"/*.dtb || true
              exit 1
            fi
            echo "$dtb_path" >> "$file_list"
            echo "✅ Queued DTB for $machine: $dtb_path"
          done

          echo "----- Files queued for S3 upload -----"
          cat "$file_list"
          
      - name: 🚀 Upload all boot.img to S3
        uses: qualcomm-linux-stg/video-driver/.github/actions/aws_s3_helper@workflow_2
        with:
          s3_bucket: qli-stg-video-gh-artifacts
          local_file: ${{ github.workspace }}/artifacts/file_list.txt
          mode: multi-upload
          upload_location: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.run_id }}-${{ github.run_attempt }}

          
      - name: 📦 Upload boot payloads as GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boot_payloads
          path: |
            ${{ github.workspace }}/qcs9100-ride-sx/qcs9100-ride-sx-boot.img
            ${{ github.workspace }}/qcs8300-ride-sx/qcs8300-ride-sx-boot.img
            ${{ github.workspace }}/qcs6490-rb3gen2/qcs6490-rb3gen2-boot.img
            ${{ github.workspace }}/artifacts/*.tar.gz
          retention-days: 7
    



    


