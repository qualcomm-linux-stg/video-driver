name: lava_trigger
description: |
  Triggers LAVA tests after pre_merge build succeeds.
  Uses workflow_run for privileged token access.

on:
  workflow_run:
    workflows: ["pre_merge"]
    types: [completed]
    branches:
      - video.qclinux.main.stage

jobs:
  loading:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    uses: qualcomm-linux-stg/video-driver/.github/workflows/loading.yml@video.qclinux.main.stage

  lava-test:
    needs: [loading]
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    uses: qualcomm-linux-stg/video-driver/.github/workflows/test.yml@video.qclinux.main.stage
    secrets: inherit
    with:
      docker_image: kmake-image:ver.1.0
      build_matrix: ${{ needs.loading.outputs.build_matrix }}
      full_matrix: ${{ needs.loading.outputs.full_matrix }}
      # ✅ Pass the pre_merge run-id so test.yml can find the artifact
      upstream_run_id: ${{ github.event.workflow_run.id }}